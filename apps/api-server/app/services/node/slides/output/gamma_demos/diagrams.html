<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma-Style Slide</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../blocks/styles/base.css">
    <link rel="stylesheet" href="../../blocks/styles/gamma_blocks.css">
</head>
<body>
    <div class="slide-root block-based" id="diagrams_demo">
        <section class="slide-section" data-purpose="introduction">

        <h1 class="block-heading block-heading-1" data-reveal-step="0">
            Visual Diagrams
        </h1>
    </section>
<section class="slide-section" data-purpose="content">

        <h3 class="block-heading block-heading-3" data-reveal-step="1">
            Sales Funnel
        </h3>
    <div class="block-diagram-funnel">

        <div class="funnel-stage" data-reveal-step="2" 
             style="width: 100%;">
            Awareness (10,000 visitors)
        </div>
        
        <div class="funnel-stage" data-reveal-step="3" 
             style="width: 85%;">
            Interest (5,000 signups)
        </div>
        
        <div class="funnel-stage" data-reveal-step="4" 
             style="width: 70%;">
            Decision (1,000 trials)
        </div>
        
        <div class="funnel-stage" data-reveal-step="5" 
             style="width: 55%;">
            Action (500 customers)
        </div>
        </div>

        <div class="block-divider" data-reveal-step="6"></div>
    
        <h3 class="block-heading block-heading-3" data-reveal-step="7">
            Skill Overlap
        </h3>
    <div class="block-diagram-venn" data-reveal-step="8">

        <div class="venn-circle venn-circle-0">
            <div class="venn-label">Tech</div>
            <div class="venn-text">Engineering</div>
        </div>
        
        <div class="venn-circle venn-circle-1">
            <div class="venn-label">Creative</div>
            <div class="venn-text">Design</div>
        </div>
        
        <div class="venn-circle venn-circle-2">
            <div class="venn-label">Both</div>
            <div class="venn-text">Product</div>
        </div>
        </div>
</section>

    </div>
    
    <!-- Navigation Controls -->
    <div class="slide-nav">
        <button id="slidePrevBtn" class="slide-nav-btn">← Previous</button>
        <span id="slideStepIndicator" class="slide-step-indicator">0 / 9</span>
        <button id="slideNextBtn" class="slide-nav-btn">Next →</button>
    </div>
    
    <!-- Animation Controller -->
    <script>
        class SlideAnimationController {
            constructor() {
                this.currentStep = 0;
                this.totalSteps = 9;
                this.elements = [];
                this.prevBtn = null;
                this.nextBtn = null;
            }

            init() {
                this.elements = Array.from(
                    document.querySelectorAll('[data-reveal-step]')
                ).sort((a, b) => {
                    return parseInt(a.dataset.revealStep) - parseInt(b.dataset.revealStep);
                });

                this.elements.forEach(el => {
                    el.classList.remove('reveal-visible');
                });

                this.setupButtons();
                this.currentStep = 0;
                this.updateButtonStates();

                console.log(`Slide initialized: ${this.totalSteps} steps`);
            }

            setupButtons() {
                this.prevBtn = document.getElementById('slidePrevBtn');
                this.nextBtn = document.getElementById('slideNextBtn');

                if (this.prevBtn) {
                    this.prevBtn.addEventListener('click', () => this.previous());
                }

                if (this.nextBtn) {
                    this.nextBtn.addEventListener('click', () => this.next());
                }

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.next();
                    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.previous();
                    }
                });
            }

            next() {
                if (this.currentStep < this.totalSteps) {
                    this.currentStep++;
                    this.goToStep(this.currentStep);
                }
            }

            previous() {
                if (this.currentStep > 0) {
                    this.currentStep--;
                    this.goToStep(this.currentStep);
                }
            }

            goToStep(step) {
                this.currentStep = Math.max(0, Math.min(step, this.totalSteps));

                this.elements.forEach((el, index) => {
                    const elementStep = index + 1;

                    if (elementStep <= this.currentStep) {
                        el.classList.add('reveal-visible');
                    } else {
                        el.classList.remove('reveal-visible');
                    }
                });

                this.updateButtonStates();
            }

            updateButtonStates() {
                if (this.prevBtn) {
                    this.prevBtn.disabled = this.currentStep === 0;
                }

                if (this.nextBtn) {
                    this.nextBtn.disabled = this.currentStep === this.totalSteps;
                }

                const indicator = document.getElementById('slideStepIndicator');
                if (indicator) {
                    indicator.textContent = `${this.currentStep} / ${this.totalSteps}`;
                }
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.slideController = new SlideAnimationController();
                window.slideController.init();
            });
        } else {
            window.slideController = new SlideAnimationController();
            window.slideController.init();
        }
    </script>
</body>
</html>
