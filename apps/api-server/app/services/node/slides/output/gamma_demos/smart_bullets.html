<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma-Style Slide</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../blocks/styles/base.css">
    <link rel="stylesheet" href="../../blocks/styles/gamma_blocks.css">
</head>
<body>
    <div class="slide-root block-based" id="smart_bullets_demo">
        <section class="slide-section" data-purpose="introduction">

        <h1 class="block-heading block-heading-1" data-reveal-step="0">
            Why Choose Our Platform?
        </h1>
    
        <p class="block-paragraph" data-reveal-step="1">
            Built for modern teams who value speed and collaboration
        </p>
    </section>
<section class="slide-section" data-purpose="content">
<div class="block-smart-bullets">

        <div class="smart-bullet" data-reveal-step="2">
            <div class="smart-bullet-icon"><i class="ri-flashlight-line"></i></div>
            <div class="smart-bullet-text">Lightning-fast performance with real-time sync</div>
        </div>
        
        <div class="smart-bullet" data-reveal-step="3">
            <div class="smart-bullet-icon"><i class="ri-shield-check-line"></i></div>
            <div class="smart-bullet-text">Enterprise-grade security and compliance</div>
        </div>
        
        <div class="smart-bullet" data-reveal-step="4">
            <div class="smart-bullet-icon"><i class="ri-palette-line"></i></div>
            <div class="smart-bullet-text">Beautiful, intuitive interface</div>
        </div>
        
        <div class="smart-bullet" data-reveal-step="5">
            <div class="smart-bullet-icon"><i class="ri-customer-service-line"></i></div>
            <div class="smart-bullet-text">24/7 customer support</div>
        </div>
        </div>
</section>

    </div>
    
    <!-- Navigation Controls -->
    <div class="slide-nav">
        <button id="slidePrevBtn" class="slide-nav-btn">← Previous</button>
        <span id="slideStepIndicator" class="slide-step-indicator">0 / 6</span>
        <button id="slideNextBtn" class="slide-nav-btn">Next →</button>
    </div>
    
    <!-- Animation Controller -->
    <script>
        class SlideAnimationController {
            constructor() {
                this.currentStep = 0;
                this.totalSteps = 6;
                this.elements = [];
                this.prevBtn = null;
                this.nextBtn = null;
            }

            init() {
                this.elements = Array.from(
                    document.querySelectorAll('[data-reveal-step]')
                ).sort((a, b) => {
                    return parseInt(a.dataset.revealStep) - parseInt(b.dataset.revealStep);
                });

                this.elements.forEach(el => {
                    el.classList.remove('reveal-visible');
                });

                this.setupButtons();
                this.currentStep = 0;
                this.updateButtonStates();

                console.log(`Slide initialized: ${this.totalSteps} steps`);
            }

            setupButtons() {
                this.prevBtn = document.getElementById('slidePrevBtn');
                this.nextBtn = document.getElementById('slideNextBtn');

                if (this.prevBtn) {
                    this.prevBtn.addEventListener('click', () => this.previous());
                }

                if (this.nextBtn) {
                    this.nextBtn.addEventListener('click', () => this.next());
                }

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.next();
                    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.previous();
                    }
                });
            }

            next() {
                if (this.currentStep < this.totalSteps) {
                    this.currentStep++;
                    this.goToStep(this.currentStep);
                }
            }

            previous() {
                if (this.currentStep > 0) {
                    this.currentStep--;
                    this.goToStep(this.currentStep);
                }
            }

            goToStep(step) {
                this.currentStep = Math.max(0, Math.min(step, this.totalSteps));

                this.elements.forEach((el, index) => {
                    const elementStep = index + 1;

                    if (elementStep <= this.currentStep) {
                        el.classList.add('reveal-visible');
                    } else {
                        el.classList.remove('reveal-visible');
                    }
                });

                this.updateButtonStates();
            }

            updateButtonStates() {
                if (this.prevBtn) {
                    this.prevBtn.disabled = this.currentStep === 0;
                }

                if (this.nextBtn) {
                    this.nextBtn.disabled = this.currentStep === this.totalSteps;
                }

                const indicator = document.getElementById('slideStepIndicator');
                if (indicator) {
                    indicator.textContent = `${this.currentStep} / ${this.totalSteps}`;
                }
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.slideController = new SlideAnimationController();
                window.slideController.init();
            });
        } else {
            window.slideController = new SlideAnimationController();
            window.slideController.init();
        }
    </script>
</body>
</html>
