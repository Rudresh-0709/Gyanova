<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GyML Slides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>

/* ========================================
   GYML PREMIUM STYLES
   ======================================== */

/* Reset & Base */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary, #0a0f1a);
    color: var(--text-primary, #f8fafc);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Deck Container */
.gyml-deck {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 3rem 2rem;
}

/* ========================================
   SECTION - Atomic Slide Unit
   ======================================== */

section {
    position: relative;
    min-height: 90vh;
    padding: 5rem 6rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(
        145deg,
        var(--bg-secondary, #0f172a) 0%,
        var(--bg-tertiary, #1e293b) 100%
    );
    border-radius: 1.5rem;
    margin-bottom: 3rem;
    overflow: hidden;
    box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.05),
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 100px -20px rgba(var(--accent-rgb, 56, 189, 248), 0.15);
}

/* Decorative gradient orb */
section::before {
    content: '';
    position: absolute;
    top: -30%;
    right: -20%;
    width: 60%;
    height: 80%;
    background: radial-gradient(
        circle,
        rgba(var(--accent-rgb, 56, 189, 248), 0.1) 0%,
        transparent 60%
    );
    pointer-events: none;
    z-index: 0;
}

section::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -20%;
    width: 50%;
    height: 60%;
    background: radial-gradient(
        circle,
        rgba(var(--accent-secondary-rgb, 168, 85, 247), 0.08) 0%,
        transparent 60%
    );
    pointer-events: none;
    z-index: 0;
}

/* Image Layouts */
section[data-image-layout="right"] {
    flex-direction: row;
    gap: 4rem;
}

section[data-image-layout="left"] {
    flex-direction: row-reverse;
    gap: 4rem;
}

section[data-image-layout="top"] {
    flex-direction: column-reverse;
    gap: 3rem;
}

section[data-image-layout="behind"] .accent-image-container {
    position: absolute;
    inset: 0;
    z-index: 0;
}

section[data-image-layout="behind"] .accent-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.15;
    filter: blur(1px);
}

/* Accent Image */
.accent-image-container {
    flex-shrink: 0;
    max-width: 45%;
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
}

.accent-image {
    width: 100%;
    height: auto;
    object-fit: cover;
    display: block;
}

/* ========================================
   BODY - Vertical Flow Container
   ======================================== */

.body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
    z-index: 1;
    position: relative;
}

/* ========================================
   TYPOGRAPHY
   ======================================== */

h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
}

h1.gradient-text {
    background: linear-gradient(
        135deg,
        var(--text-primary) 0%,
        var(--accent, #38bdf8) 50%,
        var(--accent-secondary, #a855f7) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

h2 {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--text-primary);
}

h3 {
    font-size: clamp(1.25rem, 3vw, 1.75rem);
    font-weight: 600;
    line-height: 1.3;
    color: var(--text-primary);
}

h4 {
    font-size: clamp(1rem, 2vw, 1.25rem);
    font-weight: 600;
    color: var(--text-primary);
}

p {
    font-size: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.7;
    color: var(--text-secondary, rgba(255, 255, 255, 0.7));
}

/* ========================================
   COLUMNS
   ======================================== */

.columns {
    display: flex;
    gap: 3rem;
    width: 100%;
}

.column {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: rgba(255, 255, 255, 0.02);
    padding: 2rem;
    border-radius: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

/* ========================================
   SMART LAYOUT - Grid Container
   ======================================== */

.smart-layout {
    display: grid;
    gap: 1.5rem;
    width: 100%;
}

/* Auto grid based on item count */
.smart-layout[data-item-count="2"] {
    grid-template-columns: repeat(2, 1fr);
}

.smart-layout[data-item-count="3"] {
    grid-template-columns: repeat(3, 1fr);
}

.smart-layout[data-item-count="4"] {
    grid-template-columns: repeat(2, 1fr);
}

.smart-layout[data-item-count="5"],
.smart-layout[data-item-count="6"] {
    grid-template-columns: repeat(3, 1fr);
}

/* Smart Layout Item - Premium Card */
.smart-layout-item {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 2rem;
    background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.05) 0%,
        rgba(255, 255, 255, 0.02) 100%
    );
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 1rem;
    backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
}

.smart-layout-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(
        90deg,
        var(--accent, #38bdf8),
        var(--accent-secondary, #a855f7)
    );
    opacity: 0;
    transition: opacity 0.3s ease;
}

.smart-layout-item:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.15);
    box-shadow: 
        0 20px 40px -10px rgba(0, 0, 0, 0.3),
        0 0 30px -5px rgba(var(--accent-rgb, 56, 189, 248), 0.15);
}

.smart-layout-item:hover::before {
    opacity: 1;
}

/* Number indicator */
.item-number {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent, #38bdf8);
    opacity: 0.6;
    margin-bottom: 0.5rem;
}

/* Icon styling */
.item-icon {
    width: 3rem;
    height: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(
        135deg,
        rgba(var(--accent-rgb, 56, 189, 248), 0.2) 0%,
        rgba(var(--accent-rgb, 56, 189, 248), 0.05) 100%
    );
    border-radius: 0.75rem;
    margin-bottom: 0.5rem;
}

.item-icon i {
    font-size: 1.5rem;
    color: var(--accent, #38bdf8);
}

/* Item content */
.item-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.item-heading {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
}

.item-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text-secondary, rgba(255, 255, 255, 0.65));
    margin: 0;
}

/* ========================================
   BIG BULLETS VARIANT
   ======================================== */

.smart-layout[data-variant="bigBullets"] .smart-layout-item {
    flex-direction: row;
    align-items: flex-start;
    gap: 1.5rem;
}

.smart-layout[data-variant="bigBullets"] .item-number {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    opacity: 0.3;
    line-height: 1;
    min-width: 3rem;
}

.smart-layout[data-variant="bigBullets"] .item-content {
    padding-top: 0.25rem;
}

/* ========================================
   TIMELINE VARIANT
   ======================================== */

.smart-layout[data-variant="timeline"] {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-left: 2rem;
}

.smart-layout[data-variant="timeline"] .smart-layout-item {
    flex-direction: row;
    align-items: flex-start;
    gap: 2rem;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 2rem 0;
    padding-left: 2rem;
    border-left: 2px solid rgba(var(--accent-rgb, 56, 189, 248), 0.3);
    position: relative;
}

.smart-layout[data-variant="timeline"] .smart-layout-item::before {
    display: none;
}

.smart-layout[data-variant="timeline"] .smart-layout-item::after {
    content: '';
    position: absolute;
    left: -7px;
    top: 2rem;
    width: 12px;
    height: 12px;
    background: var(--accent, #38bdf8);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(var(--accent-rgb, 56, 189, 248), 0.5);
}

.smart-layout[data-variant="timeline"] .item-year {
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    min-width: 100px;
}

.smart-layout[data-variant="timeline"] .item-description {
    font-size: 1rem;
    color: var(--text-secondary);
    line-height: 1.6;
}

/* ========================================
   STATS VARIANT
   ======================================== */

.smart-layout[data-variant="stats"] .smart-layout-item {
    text-align: center;
    justify-content: center;
    padding: 2.5rem;
}

.smart-layout[data-variant="stats"] .item-value {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    background: linear-gradient(
        135deg,
        var(--accent, #38bdf8) 0%,
        var(--accent-secondary, #a855f7) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 0.5rem;
}

.smart-layout[data-variant="stats"] .item-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.15em;
}

/* ========================================
   CARD GRID VARIANT
   ======================================== */

.smart-layout[data-variant="cardGrid"] .smart-layout-item {
    padding: 2rem;
}

/* ========================================
   PROCESS STEPS VARIANT
   ======================================== */

.smart-layout[data-variant="processSteps"] .smart-layout-item {
    flex-direction: row;
    gap: 1.5rem;
    align-items: flex-start;
}

.smart-layout[data-variant="processSteps"] .item-number {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--bg-primary);
    background: linear-gradient(
        135deg,
        var(--accent, #38bdf8) 0%,
        var(--accent-secondary, #a855f7) 100%
    );
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
    margin: 0;
    opacity: 1;
}

/* ========================================
   DIVIDER
   ======================================== */

.divider {
    border: none;
    height: 1px;
    background: linear-gradient(
        to right,
        transparent,
        rgba(var(--accent-rgb, 56, 189, 248), 0.5),
        transparent
    );
    margin: 2rem 0;
}

/* ========================================
   INLINE IMAGE
   ======================================== */

.inline-image {
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
}

.inline-image img {
    width: 100%;
    height: auto;
    display: block;
}

/* ========================================
   RESPONSIVE
   ======================================== */

@media (max-width: 1024px) {
    section {
        padding: 4rem;
    }
}

@media (max-width: 768px) {
    .gyml-deck {
        padding: 1.5rem;
    }
    
    section {
        padding: 2.5rem;
        min-height: auto;
        border-radius: 1rem;
    }
    
    section[data-image-layout="right"],
    section[data-image-layout="left"] {
        flex-direction: column;
    }
    
    .accent-image-container {
        max-width: 100%;
        margin-bottom: 2rem;
    }
    
    .columns {
        flex-direction: column;
        gap: 1.5rem;
    }
    
    .column {
        flex: 1 1 100% !important;
    }
    
    .smart-layout {
        grid-template-columns: 1fr !important;
    }
    
    .smart-layout-item {
        padding: 1.5rem;
    }
    
    .smart-layout[data-variant="bigBullets"] .smart-layout-item,
    .smart-layout[data-variant="processSteps"] .smart-layout-item {
        flex-direction: column;
        gap: 1rem;
    }
    
    .smart-layout[data-variant="bigBullets"] .item-number {
        font-size: 1.5rem;
    }
}

/* ========================================
   ANIMATIONS
   ======================================== */

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

section {
    animation: fadeInUp 0.6s ease-out;
}

.smart-layout-item {
    animation: fadeInUp 0.5s ease-out;
    animation-fill-mode: both;
}

.smart-layout-item[data-index="0"] { animation-delay: 0.1s; }
.smart-layout-item[data-index="1"] { animation-delay: 0.15s; }
.smart-layout-item[data-index="2"] { animation-delay: 0.2s; }
.smart-layout-item[data-index="3"] { animation-delay: 0.25s; }
.smart-layout-item[data-index="4"] { animation-delay: 0.3s; }
.smart-layout-item[data-index="5"] { animation-delay: 0.35s; }


:root {
    /* Colors */
    --bg-primary: #0a0f1a;
    --bg-secondary: #0f172a;
    --bg-tertiary: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: rgba(255, 255, 255, 0.65);
    --accent: #38bdf8;
    --accent-secondary: #a855f7;
    
    /* RGB values for gradients */
    --accent-rgb: 56, 189, 248;
    --accent-secondary-rgb: 168, 85, 247;
    
    /* Typography */
    --font-heading: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    
    /* Spacing */
    --spacing-unit: 1.0rem;
    --spacing-xs: calc(var(--spacing-unit) * 0.25);
    --spacing-sm: calc(var(--spacing-unit) * 0.5);
    --spacing-md: var(--spacing-unit);
    --spacing-lg: calc(var(--spacing-unit) * 1.5);
    --spacing-xl: calc(var(--spacing-unit) * 2);
    --spacing-2xl: calc(var(--spacing-unit) * 3);
    
    /* Breakpoints as CSS vars (for reference) */
    --breakpoint-mobile: 480px;
    --breakpoint-tablet: 768px;
    --breakpoint-desktop: 1024px;
    --breakpoint-wide: 1280px;
}

    </style>
</head>
<body>
    <div class="gyml-deck">
<section id="slide_5d987af6" data-image-layout="blank">
<div class="body">
<h1 class="gradient-text">Machine Learning Basics</h1>
<div class="smart-layout" data-variant="bigBullets" data-cellsize="15" data-item-count="3">
<div class="smart-layout-item" data-index="0">
<div class="item-number">01</div>
<div class="item-content">
<p class="item-text">ML is a subset of AI</p>
</div>
</div>
<div class="smart-layout-item" data-index="1">
<div class="item-number">02</div>
<div class="item-content">
<p class="item-text">Learns from data patterns</p>
</div>
</div>
<div class="smart-layout-item" data-index="2">
<div class="item-number">03</div>
<div class="item-content">
<p class="item-text">Improves with experience</p>
</div>
</div>
</div>
</div>
</section>
    </div>
</body>
