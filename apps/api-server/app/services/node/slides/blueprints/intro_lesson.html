<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Introduction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #0a0f1a;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1f3a 100%);
        }

        .background-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 26, 0.55);
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            color: white;
            max-width: 900px;
            padding: 3rem 2rem;
            animation: fadeInUp 1s ease-out;
        }

        .badge {
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(99, 102, 241, 0.95);
            margin-bottom: 1.5rem;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            margin: 0.5rem 0 1.5rem 0;
            line-height: 1.1;
            letter-spacing: -0.02em;
            word-spacing: 0.05em;
        }

        .tagline {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: rgba(255, 255, 255, 0.85);
            margin: 0;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.01em;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .content {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {% if image_url %}
        <img src="{{ image_url }}" alt="Lesson introduction background" class="background-image">
        {% endif %}
        <div class="overlay"></div>
        <div class="content">
            {% if badge %}
            <div class="badge">{{ badge }}</div>
            {% endif %}
            {% if title %}
            <h1>{{ title }}</h1>
            {% endif %}
            {% if tagline %}
            <p class="tagline">{{ tagline }}</p>
            {% endif %}
        </div>
    </div>

    <script>
        // Signal readiness to parent iframe (if embedded)
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'iframeReady' }, '*');
        }

        // Relay user interaction
        window.addEventListener('mousemove', function() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'userInteraction' }, '*');
            }
        });

        window.addEventListener('click', function() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'userInteraction' }, '*');
            }
        });
    </script>
</body>
</html>
