    <title>HISTORY Slide Previews</title>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        .slide-container { 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden;
            scroll-snap-align: start;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        html {
            scroll-snap-type: y mandatory;
        }
    </style>
</head>
